<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jacob Ferris - E-Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/21bac0c4a1.js" crossorigin="anonymous"></script>
</head>
<body>
    <section id="about-me">
        <nav>
            <div class="personal__logo">Jacob Ferris</div>
            <ul class="nav__link--list">
                <li>
                    <a href="" class="nav__link--anchor
                    link__hover-effect
                    link__hover-effect--black"
                    >Languages</a>
                </li>
                <li>
                    <a href="" class="nav__link--anchor
                    link__hover-effect
                    link__hover-effect--black"
                    >Projects</a>
                </li>
                <li>
                    <a href="" class="nav__link--anchor
                    nav__link--anchor-primary"
                    >Contact</a>
                </li>
            </ul>
        </nav>
        <div class="flex flex-1">
            <div class="about-me__info row">
                    <div class="about-me__info--container">
                        <figure class="about-me__picture--mask">
                            <img src="assets/Ferris.jpg" class="about-me__picture" alt="me">
                        </figure>
                        <h1 class="about-me__info--title">
                            Hi! I am <span class="text--blue">Jacob Ferris</span>
                        </h1>
                        <p class="about-me__info--paragraph">I am a <strong>Frontend Web Developer</strong> specializing in HTML, CSS, JavaScript, and a little bit of Python. I love to build websites with a great user experience.</p>
                        <div class="about-me__links">
                            <a href="" class="about-me__link">
                                <i class="fa-brands fa-linkedin-in"></i>
                            </a>
                            <a href="" class="about-me__link">
                                <i class="fa-brands fa-github"></i>
                            </a>
                            <a href="" class="about-me__link">
                                <i class="fa-solid fa-envelope"></i>
                            </a>
                            <a href="" class="about-me__link">
                                <i class="fa-solid fa-file"></i>
                            </a>
                        </div>
                    </div>
                    <figure class="about-me__img--container">
                        <img src="assets/undraw_overly-proud_d6j1.svg" class="about-me__img">
                    </figure>
            </div>
        </div>
    </section>
    <section id="languages">
        <div class="container">
            <div class="row">
                <h1 class="section__title">My <span class="text--blue">Tech Stack</span></h1>
                <div class="language__list">
                    <div class="language">
                        <figure class="language__img--container">
                            <img src="assets/HTML5.png" class="language__img">
                        </figure>
                        <span class="language__name">HTML</span>
                    </div>
                    <div class="language">
                        <figure class="language__img--container">
                            <img src="assets/JavaScript.webp" class="language__img">
                        </figure>
                        <span class="language__name">JavaScript</span>
                    </div>
                    <div class="language">
                        <figure class="language__img--container">
                            <img src="assets/CSS.webp" class="language__img">
                        </figure>
                        <span class="language__name">CSS</span>
                    </div>
                    <div class="language">
                        <figure class="language__img--container">
                            <img src="assets/Python.png" class="language__img">
                        </figure>
                        <span class="language__name">Python</span>
                    </div>
                    <div class="language">
                        <figure class="language__img--container">
                            <img src="assets/React.webp" class="language__img">
                        </figure>
                        <span class="language__name">React</span>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <section id="projects">
        <div class="container">
            <div class="row">
                <h1 class="section__title">Some Of <span class="text--blue">My Projects</span></span></h1>
                <ul class="projects__list">
                    <li class="project">
                        <div class="project__container">
                            <img src="assets/Placeholder.png" class="project__img" alt="placeholder">
                        </div>
                    </li>
                </ul>
            </div>
        </div>
    </section>
</body>

</html>
